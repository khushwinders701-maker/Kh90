<!DOCTYPE html>
<html lang="pa">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2157790319129830" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KH90 Store | High Speed Downloads</title>

    <style>
        :root { --primary: #ff4757; --bg: #121212; --card: #1e1e1e; --text: #f0f6fc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; text-align: center; }
        header { background: var(--card); padding: 30px; border-bottom: 3px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); margin: 0; font-size: 3rem; letter-spacing: 3px; text-shadow: 2px 2px 10px rgba(255, 71, 87, 0.3); }
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        
        /* Featured Section */
        .featured-card { background: linear-gradient(145deg, #1e1e1e, #252525); padding: 40px; border-radius: 20px; border: 2px solid var(--primary); margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Search Box */
        .search-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; margin-top: 20px; }
        .search-input { width: 60%; padding: 12px 20px; border-radius: 50px; border: 1px solid #444; background: #111; color: white; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255, 71, 87, 0.2); }
        .search-btn { padding: 12px 25px; border-radius: 50px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-left: 10px; transition: 0.3s; }
        .search-btn:hover { background: #ff6b81; transform: scale(1.05); }

        /* App Grid */
        .app-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .app-card { background: #252525; border-radius: 15px; padding: 25px; border: 1px solid var(--primary); transition: 0.3s; text-align: left; animation: fadeIn 0.5s; }
        .app-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(255, 71, 87, 0.25); }
        .app-card h3 { margin: 10px 0 5px 0; color: var(--primary); font-size: 1.5rem; }
        .app-card p { margin: 2px 0; font-size: 0.9rem; color: #8b949e; }
        
        /* Download Button */
        .download-btn { background: var(--primary); color: white; text-decoration: none; padding: 12px 20px; border-radius: 50px; display: block; text-align: center; font-weight: bold; margin-top: 20px; transition: 0.3s; cursor: pointer; }
        .download-btn:hover { background: #ff6b81; letter-spacing: 1px; }

        #loadingMsg { padding: 40px; color: #8b949e; font-style: italic; }
        footer { margin-top: 60px; padding: 30px; color: #666; border-top: 1px solid #333; font-size: 0.9rem; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <h1>KH90 STORE</h1>
        <p style="margin: 5px 0 0 0; color: #8b949e; font-size: 0.9rem;">Official Game & App Distribution Center</p>
    </header>

    <div class="container">
        <div class="featured-card">
            <div style="font-size: 4.5rem; margin-bottom: 10px;">🏎️</div>
            <h3>KH90 Car Game (V1.2)</h3>
            <p>Experience the ultimate high-speed racing on your Android device.</p>
            <a href="kh90 car game.apk" class="download-btn" style="width: 220px; margin: 20px auto 0 auto;" download>Download Official APK</a>
        </div>

        <div class="search-box">
            <h2 style="margin-top: 0;">🔍 Explore Apps</h2>
            <input type="text" id="searchInput" class="search-input" placeholder="Search by name...">
            <button class="search-btn" onclick="searchGame()">SEARCH</button>
            
            <div id="loadingMsg">🔄 Database ਨਾਲ ਕਨੈਕਟ ਹੋ ਰਿਹਾ ਹੈ...</div>
            <div id="searchResult" class="app-grid"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 KH90 Studio | All Rights Reserved</p>
    </footer>

    <script>
        const scriptURL = 'https://api.sheety.co/4884fe7796199a4d8a8005c40083d6fa/kh90/sheet1';
        let allGames = [];

        async function fetchAllGames() {
            try {
                const response = await fetch(scriptURL);
                const json = await response.json();
                allGames = json.sheet1 || [];
                renderGames(allGames);
                document.getElementById('loadingMsg').style.display = "none";
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('loadingMsg').innerText = "❌ Error: ਡੇਟਾ ਲੋਡ ਨਹੀਂ ਹੋ ਸਕਿਆ।";
            }
        }

        function renderGames(games) {
            const resultDiv = document.getElementById('searchResult');
            resultDiv.innerHTML = "";

            if (games.length > 0) {
                games.forEach((game) => {
                    // ਨਵੀਂ ਸ਼ੀਟ ਦੇ ਕਾਲਮਾਂ ਮੁਤਾਬਕ ਡੇਟਾ
                    const title = game.gameTitle || "New Application";
                    const dev = game.developerName || "KH90 Dev";
                    const plat = game.platform || "Android APK";
                    let rawLink = game.downloadUrl || "";
                    
                    // --- Google Drive Direct Download Link Logic ---
                    let directLink = rawLink;
                    if (rawLink.includes('drive.google.com')) {
                        let fileId = "";
                        if (rawLink.includes('id=')) {
                            fileId = rawLink.split('id=')[1].split('&')[0];
                        } else if (rawLink.includes('/d/')) {
                            fileId = rawLink.split('/d/')[1].split('/')[0];
                        }
                        if (fileId) {
                            directLink = `https://drive.google.com/uc?export=download&id=${fileId}`;
                        }
                    }

                    resultDiv.innerHTML += `
                        <div class="app-card">
                            <div style="font-size:3rem">📱</div>
                            <h3>${title}</h3>
                            <p><b>Developer:</b> ${dev}</p>
                            <p style="color: #58a6ff;"><b>Type:</b> ${plat}</p>
                            <a href="${directLink ? directLink : 'javascript:void(0)'}" 
                               class="download-btn" 
                               ${directLink ? 'download' : ''}
                               onclick="${directLink ? "" : "alert('ਗਲਤੀ: ਡਾਊਨਲੋਡ ਲਿੰਕ ਨਹੀਂ ਮਿਲਿਆ!')" }">
                               GET NOW
                            </a>
                        </div>`;
                });
            } else {
                resultDiv.innerHTML = "<p style='grid-column: 1/-1;'>ਕੋਈ ਐਪ ਨਹੀਂ ਮਿਲੀ।</p>";
            }
        }

        function searchGame() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = allGames.filter(g => (g.gameTitle || "").toLowerCase().includes(query));
            renderGames(filtered);
        }

        window.onload = fetchAllGames;
    </script>
</body>
</html>
